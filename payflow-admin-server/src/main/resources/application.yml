server:
  port: 3003

spring:
  application:
    name: payflow-admin-server
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:payflow_admin;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: PayFlowAdminSecretKey2026VeryLongAndSecureKeyForHS256Algorithm
  expiration: 86400000   # 24 hours in milliseconds
  header: Authorization
  prefix: "Bearer "
