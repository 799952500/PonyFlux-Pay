server:
  port: 3002
  servlet:
    context-path: /

spring:
  application:
    name: payflow-cashier-server

  # H2 开发数据库配置
  datasource:
    url: jdbc:h2:./data/cashier;AUTO_SERVER=TRUE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

  # SQL 初始化
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      encoding: UTF-8

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.payflow.cashier.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: ""
  ddl-auto: none

  # Redis 配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# RocketMQ 配置
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: payflow-cashier-producer

# PayFlow 收银台自定义配置
payflow:
  # MQ 功能开关（默认 true，有 MQ 环境时自动启用；设为 false 可在无 MQ 时优雅降级）
  mq:
    enabled: true
  jwt:
    # JWT 签名密钥（生产环境请通过环境变量注入）
    secret: cashier_jwt_secret_key_2024_secure
    # Token 有效期（秒），默认 24 小时
    expire-seconds: 86400
  signature:
    secret: default_cashier_signature_secret
    # 时间戳容差（秒），默认 5 分钟，防止重放攻击
    timestamp-tolerance: 300
  cashier:
    base-url: http://localhost:5173
  # 商户签名密钥配置（兜底配置，优先于数据库）
  # 生产环境建议从 merchant_app_secret 表读取
  merchants:
    - id: M2024040001
      name: XX科技旗舰店
      appSecret: 4f3c2b1a0e9d8c7b6a5f4e3d2c1b0a9f
    - id: M10002
      name: 测试商户2
      appSecret: abcdef1234567890fedcba0987654321

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# 日志
logging:
  level:
    root: INFO
    com.payflow.cashier: DEBUG
    com.baomidou.mybatisplus: DEBUG
