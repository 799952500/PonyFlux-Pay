server:
  port: 3002
  servlet:
    context-path: /

spring:
  application:
    name: payflow-cashier-server

  # H2 开发数据库配置
  datasource:
    url: jdbc:h2:./data/cashier;AUTO_SERVER=TRUE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

  # SQL 初始化
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      encoding: UTF-8

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.payflow.cashier.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: ""
  ddl-auto: none

# PayFlow 收银台自定义配置
payflow:
  jwt:
    # JWT 签名密钥（生产环境请通过环境变量注入）
    secret: cashier_jwt_secret_key_2024_secure
    # Token 有效期（秒），默认 24 小时
    expire-seconds: 86400
  signature:
    secret: default_cashier_signature_secret
    timestamp-tolerance: 300
  cashier:
    base-url: http://localhost:5173

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# 日志
logging:
  level:
    root: INFO
    com.payflow.cashier: DEBUG
    com.baomidou.mybatisplus: DEBUG
